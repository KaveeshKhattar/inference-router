apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: '{{ include "inference-router.fullname" . }}-router'
  labels:
    app.kubernetes.io/name: inference-router
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
subjects:
  - kind: ServiceAccount
    name: '{{ include "inference-router.serviceAccountName" . }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "inference-router.fullname" . }}-router'
