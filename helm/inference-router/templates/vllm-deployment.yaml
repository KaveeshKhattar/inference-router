apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app.kubernetes.io/name: inference-router
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vllm
spec:
  replicas: {{ .Values.vllm.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: vllm
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: vllm
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: simulator
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          args:
            - "--model"
            - "meta-llama/Llama-3.1-8B-Instruct"
            - "--port"
            - "8000"
            - "--max-num-seqs"
            - "8"
            - "--max-waiting-queue-length"
            - "100"
            - "--kv-cache-size"
            - "512"
            - "--max-model-len"
            - "2048"
            - "--time-to-first-token"
            - "400ms"
            - "--time-to-first-token-std-dev"
            - "80ms"
            - "--prefill-time-per-token"
            - "2ms"
            - "--inter-token-latency"
            - "30ms"
            - "--inter-token-latency-std-dev"
            - "8ms"
            - "--time-factor-under-load"
            - "3.0"
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
