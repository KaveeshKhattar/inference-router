apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-router
  labels:
    app.kubernetes.io/name: inference-router
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: router
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: router
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations: {}
    spec:
      serviceAccountName: {{ include "inference-router.serviceAccountName" . }}
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.router.service.targetPort }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTER_WEIGHT_SNAPSHOT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VLLM_DISCOVERY_HOST
              value: {{ .Values.router.env.VLLM_DISCOVERY_HOST | quote }}
            - name: VLLM_METRICS_PORT
              value: {{ .Values.router.env.VLLM_METRICS_PORT | quote }}
            - name: ROUTER_PORT
              value: {{ .Values.router.env.ROUTER_PORT | quote }}
            - name: ROUTER_SCRAPE_TIMEOUT
              value: {{ .Values.router.env.ROUTER_SCRAPE_TIMEOUT | quote }}
            - name: ROUTER_WEIGHT_RECALC_INTERVAL
              value: {{ .Values.router.env.ROUTER_WEIGHT_RECALC_INTERVAL | quote }}
            - name: ROUTER_WEIGHT_SNAPSHOT_ENABLED
              value: {{ .Values.router.env.ROUTER_WEIGHT_SNAPSHOT_ENABLED | quote }}
            - name: ROUTER_WEIGHT_SNAPSHOT_INTERVAL
              value: {{ .Values.router.env.ROUTER_WEIGHT_SNAPSHOT_INTERVAL | quote }}
            - name: ROUTER_WEIGHT_SNAPSHOT_CONFIGMAP
              value: {{ .Values.router.env.ROUTER_WEIGHT_SNAPSHOT_CONFIGMAP | quote }}
            - name: ROUTER_WEIGHT_SNAPSHOT_DATA_KEY
              value: {{ .Values.router.env.ROUTER_WEIGHT_SNAPSHOT_DATA_KEY | quote }}
          resources: {}
