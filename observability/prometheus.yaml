global:
  scrape_interval: 1s   # IMPORTANT: high resolution

scrape_configs:
  - job_name: 'vllm-replica-1'
    static_configs:
      - targets: ['localhost:8001']

  - job_name: 'vllm-replica-2'
    static_configs:
      - targets: ['localhost:8002']
      
  - job_name: 'inference-router'
    kubernetes_sd_configs:
      - role: service
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: inference-router # Matches your router service name